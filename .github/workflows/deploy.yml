name: Build and Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Create .env.local for build
        run: |
          cat > .env.local <<EOF
          NODE_ENV=production
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          EOF
          chmod 600 .env.local

      - name: Install deps & build
        run: |
          bun install
          bun run build
      # ✅ VALIDASI (PENTING BANGET)
      - name: Validate standalone
        run: |
          if [ ! -f ".next/standalone/server.js" ]; then
            echo "❌ server.js not found!"
            exit 1
          fi
            if [ ! -d ".next/standalone/node_modules" ]; then
              echo "❌ node_modules not found!"
              exit 1
            fi
      - name: Archive build output
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          tar -czf dist-medivaq.tar.gz -C .next/standalone .

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: 'dist-medivaq.tar.gz,DEPLOY.SH'
          target: '/tmp/deploy'

      - name: Deploy on VPS NEW
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          envs: DB_HOST,DB_USER,DB_PASSWORD,DB_NAME,APP_URL,EMAIL_HOST,EMAIL_PORT,EMAIL_USER,EMAIL_PASSWORD,EMAIL_FROM
          script: |
            bash /tmp/deploy/DEPLOY.SH
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
