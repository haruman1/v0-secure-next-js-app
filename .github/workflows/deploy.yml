name: Build and Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Create .env.local for build
        run: |
          cat > .env.local <<EOF
          NODE_ENV=production
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          EOF

      - name: Install deps & build
        run: |
          npm ci
          npm run build

      - name: Validate standalone build
        run: |
          if [ ! -f ".next/standalone/server.js" ]; then
            echo "❌ Standalone build failed"
            exit 1
          fi

      - name: Archive build output
        run: |
          cp -r public .next/standalone/
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/
          tar -czf dist-medivaq.tar.gz -C .next/standalone .

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: 'dist-medivaq.tar.gz,DEPLOY.SH'
          target: '/tmp/deploy'

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            bash /tmp/deploy/DEPLOY.SH
